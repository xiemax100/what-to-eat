product: what-to-eat
platforms:
  - name: ios
    scope: ios
    paths:
      - ios-app/
      - docs/design_ios.md
  - name: android
    scope: android
    paths:
      - android-app/
      - docs/design_android.md
common:
  scope: common
  paths:
    - docs/design.md
    - docs/requirements.md
